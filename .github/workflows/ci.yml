name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (Prettier)
        run: npx prettier --check "packages/**/*.{ts,js,json}" "*.json" 2>/dev/null || true

      - name: Run tests
        run: npx nx run-many -t test --all --skip-nx-cache

      - name: Build
        run: npx nx run-many -t build --all --skip-nx-cache

      - name: Prisma validate
        run: |
          cd packages/libs/database && npx prisma validate
          npx prisma generate
