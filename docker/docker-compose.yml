services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_platform
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APP_NAME: auth-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saas_platform
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-16}
      PORT: 3001
      AUTH_TCP_PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  workspace-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APP_NAME: workspace-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saas_platform
      PORT: 3011
      WORKSPACE_TCP_PORT: 3010
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3011/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  issue-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APP_NAME: issue-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saas_platform
      REDIS_URL: redis://redis:6379
      PORT: 3021
      ISSUE_TCP_PORT: 3020
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3021/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  notification-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APP_NAME: notification-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saas_platform
      REDIS_URL: redis://redis:6379
      PORT: 3031
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3031/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  integration-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APP_NAME: integration-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saas_platform
      REDIS_URL: redis://redis:6379
      PORT: 3041
      INTEGRATION_TCP_PORT: 3040
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3041/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        APP_NAME: api-gateway
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-16}
      AUTH_SERVICE_HOST: auth-service
      AUTH_TCP_PORT: 3002
      WORKSPACE_SERVICE_HOST: workspace-service
      WORKSPACE_TCP_PORT: 3010
      ISSUE_SERVICE_HOST: issue-service
      ISSUE_TCP_PORT: 3020
      INTEGRATION_SERVICE_HOST: integration-service
      INTEGRATION_TCP_PORT: 3040
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_healthy
      workspace-service:
        condition: service_healthy
      issue-service:
        condition: service_healthy
      integration-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
